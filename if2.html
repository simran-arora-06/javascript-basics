<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
     <!--wap to input a no and check if the no is even or odd(if else)-->
    <input type="text" id="num" placeholder="enter a number">
    <button onclick="number()">SUBMIT</button>
    <script>
        const numb = document.getElementById("num");
        function number(){
            if(num.value % 2 === 0 )
            document.writeln(num.value + "even");
        else
        document.writeln(num.value + "odd");
        }
    </script>
</body>
</html>
