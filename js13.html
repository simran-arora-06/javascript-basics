<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body><!--wap to input a character and check if it uppercase or lowercase-->
    <input type="text" id="char" placeholder="enter a character">
    <button onclick="checkchar()">CHECK</button>
    <h1 id="ans">Character is :</h1>
    <script>
        function checkchar(){
            let c = document.getElementById("char").value;
            if(c.length !== 1){
                  document.getElementById("ans").innerHTML = "please enter only one character";
            }
            else if(c >= 'a' && c <= 'z'){
                document.getElementById("ans").innerHTML = "lower case";
            }
            else if(c >= 'A' && c <= 'Z'){
                document.getElementById("ans").innerHTML = "uppercase";
            }
            else {
                document.getElementById("ans").innerHTML = "is a digit or special symbol";
            }
        }
    </script>
</body>
</html>
