<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body><!--wap to input age and check if it is child,teen,adult, or senior-->
    <input type="text" id="age" placeholder="enter the age">
    <button onclick="number()">CHECK</button>
    <h1 id="ans">:</h1>
    <script>
        function number(){
            let a = parseInt(document.getElementById("age").value);

            if(a < 13){
                document.getElementById("ans").innerHTML = "child";
            }
            else if( a > 13 && a <= 19){
                document.getElementById("ans").innerHTML = "teen";
            }
            else if (a >= 20 && a <= 59){
                document.getElementById("ans").innerHTML = "adult";
            }
            else if(a > 60){
                document.getElementById("ans").innerHTML = "senior";
            }
            else{
                document.getElementById("ans").innerHTML = "wrong age";
            }
        }
    </script>
</body>
</html>
