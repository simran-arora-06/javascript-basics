<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>multiply in js</title>
</head>
<body>
    <p id="res">Result :</p>
    <script>
        let a , b ;
        a = 29 ;
        b = 23 ;
        const res = document.getElementById("res");
        res.innerHTML = res.innerHTML + (a * b);
    </script>
</body>
</html>
