<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!--wap to input a no and check if the no is positive or negative(if else)-->
       
        <input type="text" id="num" placeholder="enter a no">
        <button onclick="number()">SUBMIT</button>
        <script>
            const numb = document.getElementById("num");
            function number(){
                if(num.value >= 0)
                document.writeln(num.value + "positive");
            else
            document.writeln(num.value + "negative");
            }
        </script>
</body>
</html>
