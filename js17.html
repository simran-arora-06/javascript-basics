<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <!--wap to input a no and check if it is even and divisible by 5 , even and not divi by 5 , odd and divi by 5 or odd and not divi by 5-->
    <input type="text" id="num" placeholder="enter a number">
    <button onclick="number()">CHECK</button>
    <h3 id="ans">The no is :</h3>
    <script>
        function number(){
            let n = parseInt(document.getElementById("num").value);
            if(isNaN(n)){
                document.getElementById("ans").innerHTML = "please enter a valid number!!!";
                return;
            }
            if( n % 2 === 0){
                if( n % 5 === 0){
                    document.getElementById("ans").innerHTML = "even & also divisible by 5";
                }
                else{
                    document.getElementById("ans").innerHTML = "even but not divisible by 5";
                }
            }
            else{
                if(n % 5 === 0){
                    document.getElementById("ans").innerHTML = "odd & divisible by 5";
                }
                else{
                    document.getElementById("ans").innerHTML = "odd but not divisible by 5";
                }
            }
        }
    </script>
</body>
 
</html>
