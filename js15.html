<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body><!--wap to input sides and check which type of triangle it is-->
    <input type="text" id="a" placeholder="enter a side">
    <input type="text" id="b" placeholder="enter b side">
    <input type="text" id="c" placeholder="enter c side">
    <button onclick="triangle()">CHECK</button>
    <h1 id="ans">Triangle is:</h1>
    <script>
        function triangle(){
            let a = parseInt(document.getElementById("a").value);
            let b = parseInt(document.getElementById("b").value);
            let c = parseInt(document.getElementById("c").value);
            if(a + b <= c || b + c <= a || a + c <= b){
                document.getElementById("ans").innerHTML = "not a triangle";
            }
            else if(a === b && b === c){
                  document.getElementById("ans").innerHTML = "Equilateral triangle";
            }
            else if(a === b || b === c || a === c){
                  document.getElementById("ans").innerHTML = "Isosceles triangle";
            }
            else{
                document.getElementById("ans").innerHTML = "Scalene triangle"
            }
        }
    </script>
</body>
</html>
