<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <input type="text" id="num" placeholder="enter a value">
    <button onclick="divide()">CHECK</button>
    <h1 id="ans">it is divisible by:</h1>
    <script>
        function divide(){
            let n = parseFloat(document.getElementById("num").value);
            if(n%5 === 0){
                if(n%3 ===0){
                    document.getElementById("ans").innerHTML = "both";
                }
                else{
                      document.getElementById("ans").innerHTML = "only 5";
                }
            }
            else if(n%3 === 0){
                  document.getElementById("ans").innerHTML = "only 3";
            }
            else{
                  document.getElementById("ans").innerHTML = "none";
            }
        }
    </script>
</body>
</html>
