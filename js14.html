<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body><!--wap to input units and check the total electricity bill
    Electricity bill:
    0–100 units → ₹5/unit
    101–200 → ₹7/unit
    201+ → ₹10/unit-->
    <input type="text" id="bill" placeholder="enter total units">
    <button onclick="bill()">SUBMIT</button>
    <h1 id="ans">Total Bill is:</h1>
    <script>
        function bill(){
            let u = parseInt(document.getElementById("bill").value);
            let total = 0;
            if(u <= 100){
                total = (u * 5);
            }
            else if (u <= 200){
                total = (100 * 5) + (u - 100) * 7;
            }
            else{
                total = (100 * 5) + (100 * 7) + (u - 200) * 10;
            }
            document.getElementById("ans").innerHTML = total ;
        }
    </script>
</body>
</html>
