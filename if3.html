<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <input type="text" id="num1" placeholder="enter a no 1">
    <input type="text" id="num2" placeholder="enter a no 2">
    <button onclick="number()">SUBMIT</button>
    <script>
        const numb1 = document.getElementById("num1");
        const numb2 = document.getElementById("num2");
        function number(){
            if(num1.value > num2.value)
            document.writeln(num1.value + "is greater");
        else
        document.writeln(num2.value + "is greater");
        }
        </script>
    
</body>
</html>
