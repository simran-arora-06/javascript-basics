<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <input type="text" id="num1" placeholder="enter 1st no">
    <input type="text" id="num2" placeholder="enter 2nd no">
    <input type="text" id="num3" placeholder="enter 3rd no">
    <button onclick="number()">SUBMIT</button>
    <script>
    function number() {
        const numb1 = document.getElementById("num1");
        const numb2 = document.getElementById("num2");
        const numb3 = document.getElementById("num3");

        if (num1.value > num2.value) {
            if (num1.value > num3.value) {
                document.writeln("1st value is greater");
            } else {
                document.writeln("3rd value is greater");
            }
        } else {
            if (num2.value > num3.value) {
                document.writeln("2nd value is greater");
            } else {
                document.writeln("3rd value is greater");
            }
        }
    }
</script>
</body>

</html>
