<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body><!--wap to input marks and check the grade-->
   
    <h3>check below</h3>
    <input type="text" id="num" placeholder="enter the marks">
    <button onclick="number()">CHECK</button>
    <h1 id="ans">RESULT:</h1>
    <script>
        function number(){
            let n = parseFloat(document.getElementById("num").value);
            if(n >= 90){
                document.getElementById("ans").innerHTML = "A+";
            }
            else if(n >=75 && n <=89){
                document.getElementById("ans").innerHTML = "B";
            }
            else if(n >= 50 && n <= 74){
                document.getElementById("ans").innerHTML = "C";
            }
            else if(n < 50){
                document.getElementById("ans").innerHTML = "FAIL";
            }
        }
    </script>

    
</body>
</html>
